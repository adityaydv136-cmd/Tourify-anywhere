<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Tourify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<canvas id="stars-canvas"></canvas>
<nav class="navbar">
  <a href="/" class="nav-logo">TOUR<span>IFY</span></a>
</nav>
<div class="form-page">
  <div class="form-container">
    <div class="form-header">
      <a href="/" class="form-logo">TOUR<span>IFY</span></a>
      <h1 class="form-title">Welcome Back</h1>
      <p class="form-subtitle">Sign in to continue your journey</p>
    </div>
    <div class="glass-card">
      <form method="POST">
        <div class="field">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In →</button>
      </form>
      <div class="form-divider">or</div>
      <div class="form-footer">
        New to Tourify? <a href="/register">Create an account</a>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
